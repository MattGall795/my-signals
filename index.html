<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto+Mono:wght@500;700&display=swap');

        :root {
            --bg-image: url('https://images.unsplash.com/photo-1644088379091-d574269d422f?q=80&w=1693&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            --glass-opacity: 0.35; 
            --accent-blue: #60a5fa;
            --signal-gold: #fbbf24;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
        }

        .controls {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); padding: 10px 20px;
            border-radius: 50px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 15px;
        }
        .controls label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}

        .header-container {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; margin: 40px 0 50px 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .main-logo {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 20px; border: 2.5px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.1);
        }

        .header-text h1 { margin: 0; font-size: 2.4rem; font-weight: 800; letter-spacing: 2px; }
        .header-text p { margin: 5px 0 0 0; font-size: 0.85rem; opacity: 0.8; letter-spacing: 4px; text-transform: uppercase; }

        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 25px; width: 100%; max-width: 1400px;
        }

        .group-card {
            background: rgba(255, 255, 255, var(--glass-opacity));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 26px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; overflow: hidden; transition: 0.3s;
        }

        .mode-night { background: rgba(15, 23, 42, var(--glass-opacity)) !important; }

        .left-panel {
            width: 190px; padding: 25px 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.15); border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .clock-face {
            width: 85px; height: 85px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4); position: relative; margin-bottom: 15px;
        }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; }
        .hour-hand { width: 4px; height: 24px; background: #fff; margin-left: -2px; }
        .min-hand { width: 3px; height: 32px; background: #ddd; margin-left: -1.5px; }
        .sec-hand { width: 1.5px; height: 36px; background: #ff4757; margin-left: -0.75px; }

        .digital-clock { font-family: 'Roboto Mono', monospace; font-size: 1.2rem; font-weight: 700; color: var(--accent-blue); }

        .right-panel { flex: 1; padding: 18px; display: flex; flex-direction: column; gap: 8px; }
        .signal-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 15px; background: rgba(0, 0, 0, 0.2); border-radius: 12px;
        }
        .sig-label { font-size: 10px; opacity: 0.8; text-transform: uppercase; font-weight: 700; color: #eee; }
        .sig-time { font-family: 'Roboto Mono', monospace; color: var(--signal-gold); font-weight: 700; font-size: 1.1rem; }

        #loader { font-weight: bold; margin-top: 100px; text-align: center; color: white; font-size: 1.2rem; letter-spacing: 1px; }

        @media (max-width: 500px) {
            .cards-grid { grid-template-columns: 1fr; }
            .group-card { flex-direction: column; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>Glass Style</label>
        <input type="range" id="glassRange" min="5" max="85" value="35">
    </div>

    <header class="header-container">
        <img id="logo" class="main-logo" src="" alt="Logo" style="display:none;">
        <div class="header-text">
            <h1>SIGNAL GLOBAL</h1>
            <p>Real-time Market Sync</p>
        </div>
    </header>

    <div id="loader">⏳ Loading System Data...</div>
    <main class="cards-grid" id="mainGrid"></main>

    <script>
        let globalRows = [];
        const sigLabels = ["Morning Signal", "Extra Signal 1", "Extra Signal 2", "Evening Signal", "VIP2 Signal", "Team Signal"];

       const API_URL = "https://script.google.com/macros/s/AKfycbyjgP77NdjATECNUrGyQ-hGUGW3wj-hMn10dHEqqX0Yq4x32Ps0jOMYCgjLW_pz2-vt/exec"; // 替换成你刚才复制的链接

window.onload = () => {
    fetch(API_URL)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                document.getElementById('loader').innerHTML = "❌ Error: " + data.error;
                return;
            }
            
            // 设置 Logo
            const logoImg = document.getElementById('logo');
            if (data.logo) {
                logoImg.src = data.logo;
                logoImg.onload = () => logoImg.style.display = 'block';
            }

            document.getElementById('loader').style.display = 'none';
            renderCards(data.rows);
        })
        .catch(err => {
            document.getElementById('loader').innerText = "❌ Fetch Failed: " + err;
        });
};

        function renderCards(rows) {
            globalRows = rows;
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            rows.forEach((row, idx) => {
                const country = row[1] || 'Unknown';
                const others = row[2] || '';
                const times = row.slice(3, 9);

                const card = document.createElement('div');
                card.className = 'group-card';
                card.id = `card-${idx}`;
                
                const signalHtml = times.map((t, i) => `
                    <div class="signal-item">
                        <span class="sig-label">${sigLabels[i]}</span>
                        <span class="sig-time">${t || '--:--'}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="left-panel">
                        <div class="clock-face">
                            <div class="hand hour-hand" id="h-${idx}"></div>
                            <div class="hand min-hand" id="m-${idx}"></div>
                            <div class="hand sec-hand" id="s-${idx}"></div>
                        </div>
                        <div class="digital-clock" id="d-${idx}">00:00:00</div>
                        <div style="text-align:center; margin-top:15px; width:100%; padding:0 10px; box-sizing:border-box;">
    <div style="
        font-size: 1.35rem !important; 
        font-weight: 800 !important; 
        color: #fff; 
        white-space: normal !important; 
        word-wrap: break-word !important; 
        word-break: break-word !important; 
        line-height: 1.2 !important;
    ">${country}</div>
    
    <div style="
        font-size: 0.75rem; 
        color: rgba(255,255,255,0.6); 
        margin-top: 8px; 
        line-height: 1.3; 
        font-weight: 500; 
        white-space: normal; 
        word-wrap: break-word;
    ">${others}</div>
</div>

                    </div>
                    <div class="right-panel">${signalHtml}</div>
                `;
                grid.appendChild(card);
            });
            
            setInterval(tick, 1000);
            tick();
        }

        function tick() {
            if (globalRows.length === 0) return;
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            
            globalRows.forEach((row, idx) => {
                const offset = parseFloat(row[0]) || 0;
                const local = new Date(utc + (3600000 * offset));
                const h = local.getHours(), m = local.getMinutes(), s = local.getSeconds();

                if (document.getElementById(`h-${idx}`)) {
                    document.getElementById(`h-${idx}`).style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
                    document.getElementById(`m-${idx}`).style.transform = `rotate(${m * 6}deg)`;
                    document.getElementById(`s-${idx}`).style.transform = `rotate(${s * 6}deg)`;
                    document.getElementById(`d-${idx}`).innerText = 
                        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                    const card = document.getElementById(`card-${idx}`);
                    if (h >= 18 || h < 6) card.classList.add('mode-night');
                    else card.classList.remove('mode-night');
                }
            });
        }

        document.getElementById('glassRange').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--glass-opacity', e.target.value / 100);
        });
    </script>
</body>
</html>
