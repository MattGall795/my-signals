<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR GROUP | Global Incentive Dashboard</title>
    
    <!-- 网站标识 Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- 核心资源 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            /* 非洲特色色温方案 */
            --safari-red: #a3141c;     /* 炽热红土色 */
            --sunset-gold: #f9a826;   /* 落日余晖金 */
            --jungle-green: #2e7d32;   /* 丛林深绿色 */
            --sand-bg: #fdf5e6;        /* 萨瓦纳沙地色 */
            --earth-brown: #5d4037;    /* 肥沃大地棕 */
            --row-odd: #fff3e0;        /* 浅色土陶黄 */
            --row-even: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            /* 增加非洲传统纹理感的背景 */
            background-color: var(--sand-bg);
            background-image: radial-gradient(var(--row-odd) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            min-height: 100vh;
        }

        /* 标头布局：左 Logo，右文字 (还原原始布局) */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-in;
        }
        .star-logo {
            height: 110px;
            width: auto;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }
        .header-text-content {
            text-align: left;
        }
        .header-title {
            color: var(--safari-red);
            font-size: 3.2em;
            font-weight: 900;
            font-style: italic;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            line-height: 1.1;
        }
        .sub-ribbon {
            background: linear-gradient(90deg, #1b5e20, var(--jungle-green), #1b5e20);
            color: white;
            display: inline-block;
            padding: 6px 30px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* 表格样式：提升对比度与仪式感 */
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
            background: white;
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid var(--safari-red);
        }
        thead { 
            background-color: var(--safari-red); 
            color: white; 
        }
        th { 
            padding: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-bottom: 4px solid var(--sunset-gold);
        }
        td { 
            padding: 18px 20px; 
            border: 1px solid #f0caCC; 
            text-align: left; 
        }
        tbody tr:nth-child(even) { background-color: var(--row-even); }
        tbody tr:nth-child(odd) { background-color: var(--row-odd); }
        tbody tr:hover { background-color: #fff9c4; transition: 0.3s; }
        
        /* 活动列样式 */
        .activity-name {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1em;
            color: var(--earth-brown);
        }
        .activity-name i { color: var(--safari-red); font-size: 1.4em; width: 35px; text-align: center; }
        
        /* 状态列样式 */
        .status-cell { text-align: center; }
        .icon-check { color: var(--jungle-green); font-size: 2.2em; }
        .icon-cross { color: #d32f2f; font-size: 2.2em; }
        .status-note {
            display: block;
            margin-top: 5px;
            color: var(--safari-red);
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 页脚：还原原始标语布局 */
        .footer {
            max-width: 1200px;
            margin: 30px auto 0;
            background: linear-gradient(90deg, #6a0b10, #8b0000, #6a0b10);
            color: var(--sunset-gold);
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .footer span { margin: 10px 20px; display: inline-block; }
        .footer i { margin-right: 8px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .header-container { flex-direction: column; text-align: center; }
            .header-text-content { text-align: center; }
            .header-title { font-size: 2.2em; }
            .footer span { display: block; margin: 10px 0; }
        }
    </style>
</head>
<body>

    <!-- 页眉布局还原 -->
    <div class="header-container">
        <img src="https://drive.google.com/thumbnail?id=1Ku8X9ZPb2xdPe04CPWMKDXRE-1DHD5jx&sz=w500" alt="STAR Logo" class="star-logo">
        
        <div class="header-text-content">
            <h1 class="header-title">Radiant Future, Shared Success.</h1>
            <div class="sub-ribbon">Exclusive Rewards &nbsp;|&nbsp; Team Support &nbsp;|&nbsp; Create Excellence</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="25%"><i class="fas fa-gift"></i> Activities</th>
                    <th width="55%"><i class="fas fa-clipboard-list"></i> Activity Description</th>
                    <th width="20%"><i class="fas fa-thumbtack"></i> Long Term?</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="3" style="text-align:center; padding: 50px;">
                    <i class="fas fa-spinner fa-spin fa-2x"></i><br>Syncing Global Database...
                </td></tr>
            </tbody>
        </table>
    </div>

    <!-- 页脚还原 -->
    <div class="footer">
        <span><i class="fas fa-sliders-h"></i> Multiple Rewards</span>
        <span><i class="fas fa-users"></i> Collective Success</span>
        <span><i class="far fa-gem"></i> Forge the Future</span>
        <span><i class="fas fa-star"></i> Advance Together</span>
    </div>

    <script>
        const SHEET_ID = '2PACX-1vSjq8ZbYo162R5aIgK5t22QmXFNUPaDMxBtsTpVKhE2cil0XkFSESD35vLLJ4XvgwpX9aTTXqjJxaDH';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            if (!data || data.length < 2) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No active records found.</td></tr>';
                return;
            }

            data.forEach((row, index) => {
                // 跳过标题行并校验 A 列
                if (index === 0 || !row[0] || row[0].trim() === "" || row[0].toLowerCase().includes('activity')) return;

                const name = row[0].trim();
                const icon = (row[1] && row[1].includes('fa-')) ? row[1].trim() : 'fas fa-star';
                const desc = row[2] ? row[2].trim() : 'Details pending update.';
                
                // 逻辑判断：TRUE/YES/Y/是
                const isLongTerm = row[3] && /TRUE|YES|Y|是/i.test(row[3].trim());
                const noteText = row[4] ? row[4].trim() : '';
                const statusNote = noteText ? `<span class="status-note">${noteText}</span>` : '';

                const statusHtml = isLongTerm 
                    ? `<i class="fas fa-check-circle icon-check"></i>` 
                    : `<i class="fas fa-times-circle icon-cross"></i>${statusNote}`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><div class="activity-name"><i class="${icon}"></i> ${name}</div></td>
                    <td style="line-height:1.6; color:#444;">${desc}</td>
                    <td class="status-cell">${statusHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        Papa.parse(CSV_URL, {
            download: true,
            header: false,
            complete: function(results) {
                renderTable(results.data);
            },
            error: function() {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="3" style="color:red; text-align:center; padding: 30px;">Sync Interrupted. Please check network connection.</td></tr>';
            }
        });
    </script>
</body>
</html>
